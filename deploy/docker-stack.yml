version: "3.9"

services:
  crm-parceiros:
    image: ghcr.io/abnermeirelles/crm-parceiros:latest
    environment:
      DATABASE_URL: ${DATABASE_URL}
      AUTH_SECRET: ${AUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-https://cat.nexasource.com.br}
      S3_ENDPOINT: ${S3_ENDPOINT}
      S3_PORT: ${S3_PORT}
      S3_USE_SSL: ${S3_USE_SSL}
      S3_BUCKET: ${S3_BUCKET}
      S3_ACCESS_KEY: ${S3_ACCESS_KEY}
      S3_SECRET_KEY: ${S3_SECRET_KEY}
      S3_REGION: ${S3_REGION}
      S3_FORCE_PATH_STYLE: ${S3_FORCE_PATH_STYLE}
      S3_PUBLIC_BASE_URL: ${S3_PUBLIC_BASE_URL}
    networks:
      - public_proxy
      - infra_internal
    deploy:
      mode: replicated
      replicas: 1
      placement:
        constraints:
          - node.role == manager
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=true
        - traefik.docker.network=public_proxy
        - traefik.http.routers.crm-parceiros.rule=Host(`${CRM_HOST:-cat.nexasource.com.br}`)
        - traefik.http.routers.crm-parceiros.entrypoints=websecure
        - traefik.http.routers.crm-parceiros.tls=true
        - traefik.http.routers.crm-parceiros.tls.certresolver=letsencrypt
        - traefik.http.services.crm-parceiros.loadbalancer.server.port=3000

networks:
  public_proxy:
    external: true
  infra_internal:
    external: true
